# GitHub search queries (--live merges results, de-duped with curated list)
live_queries:
  - q: repo:tinygrad/tinygrad is:open is:issue AMD
    tags: [tinygrad, amd]
  - q: repo:tinygrad/tinygrad is:open good first issue
    tags: [tinygrad, good-first]
  - q: repo:pytorch/vision is:open ROCm OR AMD
    tags: [pytorch, amd, vision]
  - q: repo:triton-lang/triton is:open AMD label:good-first-issue
    tags: [triton, amd]
  - q: repo:ggml-org/llama.cpp is:open ROCm OR HIP
    tags: [llama.cpp, amd, inference]
  - q: repo:commaai/openpilot is:open tinygrad OR AMD OR GPU
    tags: [tesla, commaai, autopilot]

