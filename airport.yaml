# Airport — demo + forge (L0 highway lanes; L2 disabled on forge)
enabled: true
park_minutes: 5
local_first: true
wait_for_checks: true
factory_interval_secs: 600
ci_heal_interval_secs: 900
factory_max_per_repo: 2
ci_heal_max: 1
failure_skip_hours: 6
max_concurrent_aider: 1

lanes:
  - repo: Nueramarcos/agent-habitat-demo
    kind: github
    interval: 300
    collect_max: 1
    fix_max: 1

  - repo: Nueramarcos/forge-ci-reliability
    kind: github
    interval: 360
    collect_max: 2
    fix_max: 1